name: Bug Report
description: Create a report to help us improve the Speedport integration
title: '[Bug]: '
labels: ['bug', 'triage']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: input
    id: version
    attributes:
      label: Integration Version
      description: Which version of this integration are you using?
      placeholder: v1.0.0
    validations:
      required: true
  - type: input
    id: router_model
    attributes:
      label: Router Model
      description: Which Speedport model are you using? (e.g., Speedport Smart 4, Speedport Pro Plus)
      placeholder: Speedport Smart 4
    validations:
      required: true
  - type: input
    id: firmware_version
    attributes:
      label: Firmware Version
      description: What is the firmware version of your router?
      placeholder: 010137.5.0.001.0
    validations:
      required: false
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Please copy and paste any relevant log output. Use the integration's debug logging if possible.
      render: shell

