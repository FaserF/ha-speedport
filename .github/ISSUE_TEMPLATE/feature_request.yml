name: Feature Request
description: Suggest an idea for the Speedport integration
title: '[Feature]: '
labels: ['enhancement', 'triage']
assignees:
  - FaserF
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this feature request!

        Before submitting, please check:
        - 📋 [Existing feature requests](https://github.com/FaserF/ha-speedport/issues?q=is%3Aissue+label%3Aenhancement)
        - 📖 [Documentation](https://github.com/FaserF/ha-speedport/blob/master/README.md)

  - type: textarea
    id: description
    attributes:
      label: Is your feature request related to a problem? Please describe.
      description: A clear and concise description of what the problem is.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Feature Area
      description: Which area of the integration does this feature relate to?
      options:
        - Device / connected clients tracking
        - Router stats / sensors
        - Traffic monitoring
        - DSL / WAN connection status
        - Configuration / options
        - Other
    validations:
      required: true

  - type: input
    id: router_model
    attributes:
      label: Affected Router Model (optional)
      description: Is this feature specific to a certain Speedport model?
      placeholder: e.g. Speedport Smart 4
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      description: A clear and concise description of any alternative solutions you've considered.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context or screenshots about the feature request here.
    validations:
      required: false